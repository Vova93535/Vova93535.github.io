<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bin32 / Bin16 Converter</title>
    <style>
        :root {
            --bg-page: #000;
            --bg-panel: #FFFFF0;
            --text-primary: #1a1a1a;
            --text-secondary: #333;
            --border-color: #ccc;
            --input-bg: #fff;
            --readonly-bg: #f7f7eb;
            --button-bg: #e0e0e0;
            --button-hover: #d0d0d0;
            --primary-bg: #3b6eff;
            --primary-hover: #2a5ae0;
            --error-bg: #ffebee;
            --error-border: #ef9a9a;
            --error-text: #b71c1c;
            --badge-bg: #eee;
        }
        body.light {
            --bg-page: #f5f5f0;
            --bg-panel: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #333;
            --border-color: #aaa;
            --input-bg: #fafafa;
            --readonly-bg: #f0f0e8;
            --button-bg: #ddd;
            --button-hover: #ccc;
            --primary-bg: #3b6eff;
            --primary-hover: #2a5ae0;
            --error-bg: #ffebee;
            --error-border: #ef9a9a;
            --error-text: #b71c1c;
            --badge-bg: #e0e0e0;
        }
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: var(--bg-page);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s;
        }
        .container {
            max-width: 960px;
            width: 100%;
            background: var(--bg-panel);
            border-radius: 8px;
            padding: 24px 28px 32px;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }
        h1 {
            text-align: center;
            font-weight: 300;
            font-size: 2.2rem;
            margin: 0 0 4px 0;
            letter-spacing: 1px;
            color: var(--text-primary);
        }
        h1 span {
            font-weight: 600;
            color: var(--primary-bg);
        }
        .subtitle {
            text-align: center;
            opacity: 0.7;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }
        .alphabet {
            background: var(--readonly-bg);
            border-radius: 8px;
            padding: 10px 14px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 22px;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .alphabet .num { color: #b8860b; }
        .alphabet .ah { color: #1e5a9a; }
        .alphabet .jk { color: #2e7d32; }
        .alphabet .px { color: #b34b1a; }

        .section-title {
            font-weight: 400;
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin: 18px 0 10px 0;
        }
        .row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .col {
            flex: 1;
            min-width: 220px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        textarea, input[type="text"], select {
            width: 100%;
            padding: 10px 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Courier New', monospace;
            transition: border 0.2s;
            resize: vertical;
        }
        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: var(--primary-bg);
        }
        textarea {
            min-height: 100px;
        }
        .readonly {
            background: var(--readonly-bg);
            color: var(--text-primary);
            cursor: default;
        }
        .inline-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            margin: 8px 0 10px;
        }
        .inline-group label {
            display: inline-block;
            margin-right: 2px;
            text-transform: none;
            letter-spacing: 0;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        .inline-group input[type="radio"],
        .inline-group input[type="checkbox"] {
            accent-color: var(--primary-bg);
            margin-right: 4px;
        }
        .inline-group select {
            width: auto;
            padding: 6px 10px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 16px 0 10px;
        }
        button {
            background: var(--button-bg);
            border: none;
            color: var(--text-primary);
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            flex: 1;
            min-width: 110px;
            font-size: 0.95rem;
        }
        button:hover {
            background: var(--button-hover);
        }
        button.primary {
            background: var(--primary-bg);
            color: #fff;
        }
        button.primary:hover {
            background: var(--primary-hover);
        }
        button:active {
            transform: scale(0.97);
        }
        .footer {
            margin-top: 24px;
            font-size: 0.75rem;
            text-align: center;
            opacity: 0.6;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            color: var(--text-secondary);
        }
        .badge {
            background: var(--badge-bg);
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--text-primary);
            display: inline-block;
            margin-left: 6px;
        }
        .error-msg {
            color: var(--error-text);
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: 8px;
            padding: 8px 14px;
            margin: 8px 0;
            display: none;
        }
        .theme-toggle {
            float: right;
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.9rem;
            cursor: pointer;
            background: var(--button-bg);
            color: var(--text-primary);
        }
        .theme-toggle:hover {
            background: var(--button-hover);
        }
        @media (max-width: 700px) {
            .container { padding: 16px; }
            .row { flex-direction: column; }
            .theme-toggle { float: none; display: inline-block; margin-bottom: 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <h1>Bin<span>32</span> / Bin<span>16</span></h1>
        <button class="theme-toggle" onclick="toggleTheme()">Theme</button>
    </div>
    <div class="subtitle">
        32-ary system · alphabet <span style="font-family:monospace;">0-9 A-H J-N P-X</span>
        <span class="badge">.ttcodedisk</span>
    </div>
    <div class="alphabet">
        <span class="num">0123456789</span>
        <span class="ah">ABCDEFGH</span>
        <span class="jk">JKLMN</span>
        <span class="px">PQRSTUVWX</span>
    </div>

    <div class="section-title">Text</div>
    <textarea id="inputText" placeholder="Enter text to encode or decode">This is a secret message, you need this 512K4D1D51158K1D51354HRD01146LG=</textarea>

    <div class="inline-group">
        <label>Mode:</label>
        <select id="modeSelect">
            <option value="utf8">UTF-8</option>
            <option value="ascii">ASCII</option>
            <option value="auto" selected>Auto</option>
        </select>
        <label>Padding char:</label>
        <input type="text" id="paddingChar" value="=" maxlength="1" style="width:60px; padding:4px 8px;" />
        <label><input type="checkbox" id="noPadCheck" /> No padding</label>
    </div>

    <div class="row">
        <div class="col">
            <label>Bin16 [hex]</label>
            <textarea id="outputHex" class="readonly" readonly placeholder="Hexadecimal output"></textarea>
        </div>
        <div class="col">
            <label>Bin32 (5-bit code)</label>
            <textarea id="outputBin32" class="readonly" readonly placeholder="32-ary output"></textarea>
        </div>
    </div>

    <div class="inline-group">
        <label><input type="radio" name="system" value="bin32" checked /> Bin32</label>
        <label><input type="radio" name="system" value="bin16" /> Bin16</label>
    </div>

    <div class="btn-group">
        <button class="primary" onclick="encode()">ENCODE</button>
        <button class="primary" onclick="decode()">DECODE</button>
        <button onclick="clearAll()">CLEAR</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>

    <div class="footer">
        Bin32 system · alphabet excludes O and I
    </div>
</div>

<script>
    const ALPHABET = "0123456789ABCDEFGHJKLMNPQRSTUVWX";

    function b32encode(bytes, paddingChar = '=', noPad = false) {
        if (!bytes || bytes.length === 0) return "";
        const result = [];
        for (let i = 0; i < bytes.length; i += 5) {
            const chunk = bytes.slice(i, i + 5);
            const padded = new Uint8Array(5);
            padded.set(chunk);
            let value = 0;
            for (let j = 0; j < 5; j++) {
                value = (value << 8) | padded[j];
            }
            for (let shift = 7; shift >= 0; shift--) {
                const idx = (value >> (shift * 5)) & 0x1F;
                result.push(ALPHABET[idx]);
            }
        }
        const rem = bytes.length % 5;
        if (!noPad) {
            if (rem === 1) {
                result.splice(result.length - 6, 6, paddingChar, paddingChar, paddingChar, paddingChar, paddingChar, paddingChar);
            } else if (rem === 2) {
                result.splice(result.length - 4, 4, paddingChar, paddingChar, paddingChar, paddingChar);
            } else if (rem === 3) {
                result.splice(result.length - 3, 3, paddingChar, paddingChar, paddingChar);
            } else if (rem === 4) {
                result.splice(result.length - 1, 1, paddingChar);
            }
        }
        return result.join('');
    }

    function b32decode(str, paddingChar = '=') {
        if (paddingChar !== '=') {
            str = str.replace(new RegExp(paddingChar.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'), '=');
        }
        str = str.replace(/\s/g, '');
        if (!str) return new Uint8Array(0);
        str = str.replace(/=/g, '');
        if (str.length % 8 !== 0 && str.length % 8 !== 2 && str.length % 8 !== 4 && str.length % 8 !== 5 && str.length % 8 !== 7) {
            throw new Error("Invalid Bin32 string length");
        }
        let bits = '';
        for (let ch of str) {
            const idx = ALPHABET.indexOf(ch);
            if (idx === -1) throw new Error(`Invalid character: '${ch}'`);
            bits += idx.toString(2).padStart(5, '0');
        }
        const totalBytes = Math.floor((str.length * 5) / 8);
        bits = bits.slice(0, totalBytes * 8);
        while (bits.length % 8 !== 0) bits += '0';
        const byteArray = new Uint8Array(totalBytes);
        for (let i = 0; i < totalBytes; i++) {
            byteArray[i] = parseInt(bits.slice(i * 8, i * 8 + 8), 2);
        }
        return byteArray;
    }

    function hexEncode(bytes) {
        return Array.from(bytes).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join('');
    }

    function hexDecode(str) {
        str = str.replace(/\s/g, '');
        if (str.length % 2 !== 0) throw new Error("Hex string must have even length");
        const bytes = new Uint8Array(str.length / 2);
        for (let i = 0; i < str.length; i += 2) {
            const hex = str.substr(i, 2);
            const val = parseInt(hex, 16);
            if (isNaN(val)) throw new Error(`Invalid hex: ${hex}`);
            bytes[i/2] = val;
        }
        return bytes;
    }

    function textToBytes(text, mode) {
        if (mode === 'ascii') {
            const bytes = [];
            for (let i = 0; i < text.length; i++) {
                const code = text.charCodeAt(i);
                if (code > 127) throw new Error('Text contains non-ASCII characters (code > 127)');
                bytes.push(code);
            }
            return new Uint8Array(bytes);
        } else if (mode === 'utf8' || mode === 'auto') {
            return new TextEncoder().encode(text);
        }
        throw new Error('Unknown mode');
    }

    function bytesToText(bytes, mode) {
        if (mode === 'ascii') {
            let text = '';
            for (let b of bytes) {
                if (b > 127) throw new Error('Byte is not ASCII (value > 127)');
                text += String.fromCharCode(b);
            }
            return text;
        } else if (mode === 'utf8') {
            return new TextDecoder().decode(bytes);
        } else if (mode === 'auto') {
            try {
                return new TextDecoder('utf-8', { fatal: true }).decode(bytes);
            } catch (e) {
                let text = '';
                for (let b of bytes) {
                    if (b > 127) text += '�';
                    else text += String.fromCharCode(b);
                }
                return text;
            }
        }
        throw new Error('Unknown mode');
    }

    function getMode() {
        return document.getElementById('modeSelect').value;
    }

    function getSystem() {
        const radios = document.getElementsByName('system');
        for (let r of radios) if (r.checked) return r.value;
        return 'bin32';
    }

    function getPaddingChar() {
        return document.getElementById('paddingChar').value || '=';
    }

    function getNoPad() {
        return document.getElementById('noPadCheck').checked;
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    function clearAll() {
        document.getElementById('inputText').value = '';
        document.getElementById('outputHex').value = '';
        document.getElementById('outputBin32').value = '';
        document.getElementById('errorMsg').style.display = 'none';
    }

    function encode() {
        const text = document.getElementById('inputText').value;
        if (!text) { showError('Enter text to encode'); return; }
        const mode = getMode();
        const system = getSystem();
        const padding = getPaddingChar();
        const noPad = getNoPad();
        try {
            const bytes = textToBytes(text, mode);
            if (system === 'bin32') {
                const result = b32encode(bytes, padding, noPad);
                document.getElementById('outputBin32').value = result;
                document.getElementById('outputHex').value = '';
            } else {
                const result = hexEncode(bytes);
                document.getElementById('outputHex').value = result;
                document.getElementById('outputBin32').value = '';
            }
        } catch (e) {
            showError('Encode error: ' + e.message);
        }
    }

    function decode() {
        const system = getSystem();
        const mode = getMode();
        const padding = getPaddingChar();
        let encoded;
        if (system === 'bin32') {
            encoded = document.getElementById('outputBin32').value.trim();
            if (!encoded) { showError('Bin32 field is empty'); return; }
        } else {
            encoded = document.getElementById('outputHex').value.trim();
            if (!encoded) { showError('Bin16 field is empty'); return; }
        }
        try {
            let bytes;
            if (system === 'bin32') {
                bytes = b32decode(encoded, padding);
            } else {
                bytes = hexDecode(encoded);
            }
            const text = bytesToText(bytes, mode);
            document.getElementById('inputText').value = text;
        } catch (e) {
            showError('Decode error: ' + e.message);
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('light');
        const theme = document.body.classList.contains('light') ? 'light' : 'dark';
        localStorage.setItem('theme', theme);
    }

    (function loadTheme() {
        const theme = localStorage.getItem('theme');
        if (theme === 'light') {
            document.body.classList.add('light');
        }
    })();

    window.onload = function() {
        document.getElementById('inputText').value = 'Test';
        document.getElementById('modeSelect').value = 'auto';
        document.querySelector('input[name="system"][value="bin32"]').checked = true;
        encode();
    };
</script>
</body>
</html>
