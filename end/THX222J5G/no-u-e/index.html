<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>end</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fff;
            color: #000;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 4rem;
            font-weight: normal;
            letter-spacing: 6px;
            margin-bottom: 20px;
            color: #000;
        }
        .sub {
            font-size: 1.2rem;
            opacity: 0.6;
            margin-bottom: 40px;
        }
        .symbol {
            font-size: 5rem;
            opacity: 0.2;
            margin: 30px 0;
        }
        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            opacity: 0.3;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✦ END ✦</h1>
        <div class="sub">you have reached the final place</div>
        <div class="symbol">⌘</div>
        <p style="font-size: 1.1rem; opacity: 0.7;">nothing more to see here</p>
        <p style="font-size: 0.9rem; opacity: 0.4; margin-top: 20px;">— thank you for playing —</p>
        <div class="footer">deep web · 2026</div>
    </div>
</body>
</html>
