<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #000;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: normal;
            letter-spacing: 4px;
            margin-bottom: 30px;
            color: #000;
        }
        .image {
            margin: 20px auto;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .image svg {
            width: 100%;
            height: 100%;
        }
        .input-area {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .input-area input {
            background: #f5f5f5;
            border: 2px solid #ccc;
            border-radius: 4px;
            color: #000;
            padding: 12px 20px;
            font-size: 1.2rem;
            width: 80%;
            max-width: 400px;
            text-align: center;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-area input:focus {
            border-color: #888;
        }
        .input-area button {
            background: #000;
            border: 2px solid #000;
            color: #fff;
            padding: 10px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
            border-radius: 4px;
        }
        .input-area button:hover {
            background: #333;
            border-color: #333;
        }
        .hint {
            margin-top: 20px;
            font-size: 0.7rem;
            opacity: 0.2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TYPE U4GI5O5H</h1>
        <div class="image">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#000" />
            </svg>
        </div>

        <div class="input-area">
            <input type="text" id="answerInput" placeholder="enter code..." />
            <button onclick="handleSubmit()">submit</button>
        </div>
        <div class="hint">hint: look at the title</div>
    </div>

    <script>
        const correctAnswer = "H5CBF346O";

        function handleSubmit() {
            const input = document.getElementById('answerInput');
            const value = input.value.trim();

            if (value === correctAnswer) {
                // Правильно – переход на конечную страницу
                window.location.href = '/end/THX222J5G/no-u-e/';
            } else {
                // Неправильно – возврат на главную
                window.location.href = '/webdeep/';
            }
        }

        // Обработка нажатия Enter
        document.getElementById('answerInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                handleSubmit();
            }
        });
    </script>
</body>
</html>
