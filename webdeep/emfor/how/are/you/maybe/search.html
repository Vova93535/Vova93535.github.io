<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #000;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: normal;
            letter-spacing: 4px;
            margin-bottom: 30px;
            color: #000;
        }
        .image {
            margin: 20px auto;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .image svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TYPE U4GI5O5H</h1>
        <div class="image">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#000" />
            </svg>
        </div>

        <div class="input-area">
            <input type="text" id="answerInput" placeholder="enter code..." />
            <button onclick="goHome()">submit</button>
        </div>
    </div>

    <script>
        function goHome() {
            window.location.href = '/webdeep/';
        }
        document.getElementById('answerInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                goHome();
            }
        });
    </script>
</body>
</html>
