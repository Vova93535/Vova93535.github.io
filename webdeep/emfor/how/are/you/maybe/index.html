<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>maybe</title>
</head>
<body>
    <div class="container">
        <div class="google-logo">Google</div>
        <input type="text" class="google-input" placeholder="search..." />
        <br />
        <button class="google-btn">Google Search</button>
        <p class="hint">something with 2*16</p>
    </div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const input = document.querySelector('.google-input');
    const btn = document.querySelector('.google-btn');

    function handleSearch() {
      if (input.value.trim() === '32') {
        window.location.href = 'search.html?q=32';
      }
    }

    btn.addEventListener('click', handleSearch);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        handleSearch();
      }
    });
  });
</script>
</body>
</html>
